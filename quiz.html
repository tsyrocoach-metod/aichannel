                many: "Тебе также понравится: просить ИИ делать несколько задач за один запрос — он справится.",
                deep: "Тебе также понравится: вести длинный диалог с ИИ, углубляясь в одну тему.",
                chaos: "Тебе также понравится: генерировать десятки гипотез за секунду, когда нужен мозговой штурм."
            };

            const handleSelect = (option) => {
                const newAnswers = [...answers, option.scores];
                setAnswers(newAnswers);
                
                if (currentQuestion < quizData.length - 1) {
                setTimeout(() => setCurrentQuestion(currentQuestion + 1), 300);
                } else {
                setTimeout(() => calculateResult(newAnswers), 300);
                }
            };

            const calculateResult = (finalAnswers) => {
                const totalScores = { chaos: 0, structure: 0, people: 0, create: 0, analysis: 0, many: 0, deep: 0 };
                finalAnswers.forEach(ans => {
                Object.keys(ans).forEach(key => {
                    totalScores[key] += ans[key];
                });
                });

                let bestProfile = profiles[0];
                let maxScore = -999;

                profiles.forEach(p => {
                let score = 0;
                Object.keys(p.weights).forEach(key => {
                    score += (totalScores[key] || 0) * p.weights[key];
                });
                if (score > maxScore) {
                    maxScore = score;
                    bestProfile = p;
                }
                });

                let extraKey = '';
                let extraMax = -1;
                
                Object.keys(totalScores).forEach(key => {
                if (!bestProfile.weights[key] && totalScores[key] > extraMax) {
                    extraMax = totalScores[key];
                    extraKey = key;
                }
                });

                const extraText = extraKey && extraRecommendations[extraKey] 
                ? extraRecommendations[extraKey] 
                : extraRecommendations['create'];

                setResult({ ...bestProfile, extraText });
                setScreen('result');
            };

            const copyTasks = () => {
                const text = `Моя ИИ-Суперсила: ${result.title}\n\nПопробуй прямо сейчас:\nДЛЯ ЖИЗНИ:\n${result.life.map(t => '• ' + t).join('\n')}\n\nДЛЯ РАБОТЫ:\n${result.work.map(t => '• ' + t).join('\n')}`;
                navigator.clipboard.writeText(text);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const resetQuiz = () => {
                setAnswers([]);
                setCurrentQuestion(0);
                setResult(null);
                setScreen('intro');
            };

            return (
                <div className="min-h-screen bg-[#050505] text-white font-sans selection:bg-violet-500/30">
                <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
                    <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-violet-600/10 blur-[120px] rounded-full"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-fuchsia-600/10 blur-[120px] rounded-full"></div>
                </div>

                <div className="relative z-10 max-w-2xl mx-auto min-h-screen flex flex-col p-4 md:p-8">
                    
                    {screen === 'intro' && (
                    <div className="flex-grow flex flex-col items-center justify-center text-center space-y-8 animate-in fade-in zoom-in duration-700">
                        <div className="w-24 h-24 rounded-3xl bg-gradient-to-tr from-violet-600 to-fuchsia-500 flex items-center justify-center shadow-2xl shadow-violet-500/20 rotate-3">
                        <Sparkles className="w-12 h-12 text-white" />
                        </div>
                        <div className="space-y-4 max-w-lg">
                        <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight italic">
                            Какой ИИ-суперсилой ты ещё не пользуешься?
                        </h1>
                        <p className="text-slate-400 text-lg md:text-xl leading-relaxed">
                            Ответь на 8 жизненных ситуаций и получи персональный список задач, которые ты можешь делегировать нейросетям уже сегодня.
                        </p>
                        </div>
                        <button 
                        onClick={() => setScreen('quiz')}
                        className="w-full max-w-md bg-gradient-to-r from-violet-600 to-fuchsia-600 py-5 rounded-2xl font-bold text-lg shadow-xl shadow-violet-500/20 active:scale-95 transition-all uppercase tracking-widest"
                        >
                        Начать анализ
                        </button>
                        <p className="text-xs text-slate-500 uppercase tracking-widest">~ 2 минуты на прохождение</p>
                    </div>
                    )}

                    {screen === 'quiz' && (
                    <div className="flex-grow flex flex-col pt-4 md:pt-8">
                        <div className="mb-10 space-y-4">
                        <div className="flex justify-between items-end">
                            <span className="text-xs font-black tracking-widest text-violet-500 uppercase">
                            Вопрос {currentQuestion + 1} из 8
                            </span>
                            <span className="text-xs font-black text-slate-500 uppercase">
                            {Math.round(((currentQuestion + 1) / 8) * 100)}%
                            </span>
                        </div>
                        <div className="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                            <div 
                            className="h-full bg-gradient-to-r from-violet-500 to-fuchsia-500 transition-all duration-500"
                            style={{ width: `${((currentQuestion + 1) / 8) * 100}%` }}
                            ></div>
                        </div>
                        </div>

                        <div key={currentQuestion} className="space-y-8 animate-in slide-in-from-right duration-500 flex-grow">
                        <h2 className="text-2xl md:text-3xl font-bold leading-relaxed italic whitespace-pre-wrap">
                            {quizData[currentQuestion].q}
                        </h2>

                        <div className="space-y-4">
                            {quizData[currentQuestion].options.map((opt) => (
                            <button
                                key={opt.id}
                                onClick={() => handleSelect(opt)}
                                className="w-full p-5 md:p-6 text-left rounded-3xl border border-white/5 bg-white/5 hover:bg-violet-500/10 hover:border-violet-500/30 transition-all active:scale-[0.98] group flex items-start gap-4"
                            >
                                <span className="flex-shrink-0 w-8 h-8 rounded-xl bg-white/10 flex items-center justify-center text-xs font-black group-hover:bg-violet-500 group-hover:text-white transition-colors mt-0.5">
                                {opt.id}
                                </span>
                                <span className="text-sm md:text-base font-medium text-slate-200 leading-relaxed whitespace-pre-wrap">
                                {opt.text}
                                </span>
                            </button>
                            ))}
                        </div>
                        </div>

                        <div className="pt-8 pb-4 text-center">
                        {currentQuestion > 0 && (
                            <button 
                            onClick={() => {
                                setAnswers(answers.slice(0, -1));
                                setCurrentQuestion(currentQuestion - 1);
                            }}
                            className="inline-flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-white transition-colors uppercase tracking-widest"
                            >
                            <ChevronLeft className="w-5 h-5" /> Назад
                            </button>
                        )}
                        </div>
                    </div>
                    )}

                    {screen === 'result' && (
                    <div className="flex-grow flex flex-col py-8 animate-in fade-in zoom-in duration-1000">
                        <div className="text-center space-y-6 mb-10">
                        <div className="inline-flex p-5 rounded-3xl bg-violet-500/10 border border-violet-500/20 text-violet-400 mb-2">
                            {result.icon}
                        </div>
                        <div className="space-y-3">
                            <p className="text-xs font-black tracking-[0.2em] text-violet-500 uppercase">Твоя ИИ-суперсила</p>
                            <h2 className="text-4xl md:text-5xl font-black italic tracking-tight uppercase">{result.title}</h2>
                        </div>
                        <p className="text-slate-300 text-base leading-relaxed italic px-2 whitespace-pre-wrap">
                            {result.description}
                        </p>
                        <div className="inline-block px-4 py-2 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-sm font-bold">
                            {result.superpower}
                        </div>
                        </div>

                        <div className="space-y-8 flex-grow">
                        
                        <div className="space-y-4">
                            <h3 className="text-sm font-black uppercase tracking-widest text-slate-500 px-2">Попробуй прямо сейчас (Для жизни):</h3>
                            <div className="grid gap-3">
                            {result.life.map((task, i) => (
                                <div key={i} className="p-5 md:p-6 rounded-3xl border border-white/5 bg-white/5 flex gap-4 items-start group hover:bg-white/[0.07] transition-colors">
                                <div className="w-6 h-6 flex-shrink-0 rounded-full bg-violet-500/20 flex items-center justify-center text-violet-400 text-xs font-black mt-0.5">
                                    {i + 1}
                                </div>
                                <p className="text-sm md:text-base font-medium text-slate-200 leading-relaxed whitespace-pre-wrap">{task}</p>
                                </div>
                            ))}
                            </div>
                        </div>

                        <div className="space-y-4">
                            <h3 className="text-sm font-black uppercase tracking-widest text-slate-500 px-2">Для работы:</h3>
                            <div className="grid gap-3">
                            {result.work.map((task, i) => (
                                <div key={i} className="p-5 md:p-6 rounded-3xl border border-white/5 bg-white/5 flex gap-4 items-start group hover:bg-white/[0.07] transition-colors">
                                <div className="w-6 h-6 flex-shrink-0 rounded-full bg-fuchsia-500/20 flex items-center justify-center text-fuchsia-400 text-xs font-black mt-0.5">
                                    {i + 1}
                                </div>
                                <p className="text-sm md:text-base font-medium text-slate-200 leading-relaxed whitespace-pre-wrap">{task}</p>
                                </div>
                            ))}
                            </div>
                        </div>

                        <div className="p-6 md:p-8 rounded-3xl bg-violet-600/10 border border-violet-600/20 space-y-4">
                            <p className="text-sm md:text-base font-bold text-white">
                            С какой нейросети начать: <span className="text-violet-400">{result.aiRecommendation}</span>
                            </p>
                            <div className="h-px w-full bg-white/10"></div>
                            <p className="text-sm leading-relaxed italic text-violet-200">
                            {result.extraText}
                            </p>
                        </div>

                        <div className="space-y-4 pt-6">
                            <button onClick={copyTasks} className="w-full py-5 rounded-2xl border border-white/10 bg-white/5 font-bold text-sm hover:bg-white/10 transition-colors flex items-center justify-center gap-2 uppercase tracking-widest">
                            {copied ? <><Check className="w-5 h-5 text-emerald-400" /> СКОПИРОВАНО</> : <><Copy className="w-5 h-5 text-violet-400" /> СКОПИРОВАТЬ ЗАДАЧИ</>}
                            </button>

                            <div className="p-8 md:p-10 rounded-[2.5rem] bg-gradient-to-br from-violet-600 to-fuchsia-600 text-center space-y-6 shadow-2xl shadow-violet-500/20 mt-8">
                            <h3 className="text-2xl font-black italic leading-tight">Хочешь научиться использовать эту суперсилу на полную?</h3>
                            <p className="text-base text-white/90 leading-relaxed">
                                25 апреля — практикум «Первые шаги в ИИ» с Ириной Клейман. За 3 часа вы решите свою первую реальную задачу с помощью ИИ.
                            </p>
                            <button className="w-full bg-white text-violet-600 py-5 rounded-2xl font-black uppercase tracking-widest text-sm hover:bg-slate-100 transition-colors shadow-xl">
                                Настроить ИИ для этих задач →
                            </button>
                            </div>

                            <button 
                            onClick={resetQuiz}
                            className="w-full py-5 text-sm font-bold text-slate-500 flex items-center justify-center gap-2 hover:text-white transition-colors uppercase tracking-widest"
                            >
                            <RotateCcw className="w-4 h-4" /> Пройти заново
                            </button>
                        </div>
                        </div>
                    </div>
                    )}
                </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
